<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTask</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wrapper">
        <h1>CloudTask</h1>
        <p class="tagline">Your tasks, all in one place.</p>

        <div class="search-row">
            <input
                type="text"
                id="search"
                placeholder="Search tasks..."
                onkeyup="searchTask()"
            >
        </div>

        <div class="input-row">
            <input
                id="taskInput"
                placeholder="Add a new task..."
            >
            <button onclick="addTask()" id="addBtn">Add</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
            <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
        </div>

        <div class="count-row">
            <p id="count" class="count"></p>
            <button id="clearAll" class="clear-btn" onclick="clearAll()">Clear All</button>
        </div>

        <div id="taskList" class="task-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
